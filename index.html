<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>RIKU 3D - RPG MODE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --rpg-gold: #ffd700; --rpg-red: #ff4444; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; }
        
        /* RPG風HUD */
        #rpg-hud { position: absolute; bottom: 20px; left: 20px; color: white; z-index: 10; display: none; }
        .lv-badge { background: var(--rpg-gold); color: black; padding: 5px 15px; font-weight: bold; border-radius: 5px; font-size: 24px; }
        .exp-bar { width: 300px; height: 10px; background: #333; margin-top: 10px; border: 1px solid #fff; }
        #exp-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.5s; }
        
        /* レベルアップ演出 */
        #lv-up-text { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; color: var(--rpg-gold); font-weight: bold; font-style: italic;
            text-shadow: 0 0 20px #fff; display: none; z-index: 100;
            animation: levelUpAnim 2s forwards;
        }
        @keyframes levelUpAnim {
            0% { opacity: 0; transform: translate(-50%, 0%); }
            50% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }
    </style>
</head>
<body>

    <div id="lv-up-text">LEVEL UP!!</div>

    <div id="rpg-hud">
        <span class="lv-badge">LV. <span id="lv-val">1</span></span>
        <div style="margin-top:10px;">HP: <span id="hp-val">100</span> / 100</div>
        <div class="exp-bar"><div id="exp-fill"></div></div>
        <div style="font-size:14px; opacity:0.8;">NEXT LEVEL: <span id="exp-val">0</span>/1000</div>
    </div>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.3;">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/LA50iqj0KjU?autoplay=1&mute=1&loop=1&playlist=LA50iqj0KjU" frameborder="0"></iframe>
    </div>

    <script>
        let scene, camera, renderer, player, sword;
        let lv = 1, exp = 0, hp = 100;
        let enemies = [], keys = {}, yaw = 0, pitch = 0;

        function initRPG() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.Fog(0x050510, 10, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ファンタジーな地面
            const floor = new THREE.GridHelper(200, 40, 0x8844ff, 0x221144);
            scene.add(floor);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            player = new THREE.Group();
            player.position.set(0, 1.6, 5);
            scene.add(player);

            // 武器：勇者の剣
            const swordGeo = new THREE.BoxGeometry(0.1, 1.2, 0.2);
            const swordMat = new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 1, roughness: 0.2});
            sword = new THREE.Mesh(swordGeo, swordMat);
            sword.position.set(0.5, -0.5, -0.8);
            sword.rotation.x = Math.PI/3;
            player.add(sword);

            // 敵（モンスターカカシ）を配置
            for(let i=0; i<5; i++) spawnEnemy();

            document.getElementById('rpg-hud').style.display = 'block';
            animate();
            document.body.requestPointerLock();
        }

        function spawnEnemy() {
            const m = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0xff4444}));
            m.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            scene.add(m);
            enemies.push(m);
        }

        function attack() {
            // 剣を振るアニメ
            sword.rotation.x = 0;
            setTimeout(() => sword.rotation.x = Math.PI/3, 200);

            // 当たり判定
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            enemies.forEach((en, idx) => {
                if(ray.intersectObject(en).length > 0) {
                    gainExp(250);
                    scene.remove(en);
                    enemies.splice(idx, 1);
                    setTimeout(spawnEnemy, 2000); // 復活
                }
            });
        }

        function gainExp(amt) {
            exp += amt;
            if(exp >= 1000) {
                lv++; exp = 0;
                document.getElementById('lv-up-text').style.display = 'block';
                setTimeout(() => document.getElementById('lv-up-text').style.display = 'none', 2000);
            }
            document.getElementById('lv-val').innerText = lv;
            document.getElementById('exp-val').innerText = exp;
            document.getElementById('exp-fill').style.width = (exp/1000)*100 + "%";
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(document.pointerLockElement) attack(); });
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const s = 0.15;
            if(keys['KeyW']) { player.position.x += Math.sin(yaw)*s; player.position.z += Math.cos(yaw)*s; }
            if(keys['KeyS']) { player.position.x -= Math.sin(yaw)*s; player.position.z -= Math.cos(yaw)*s; }
            player.rotation.y = yaw;
            camera.position.copy(player.position);
            camera.rotation.set(pitch, yaw+Math.PI, 0, 'YXZ');
            renderer.render(scene, camera);
        }

        initRPG();
    </script>
</body>
</html>
