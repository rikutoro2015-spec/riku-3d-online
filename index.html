<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RIKU 3D OMEGA - COMPLETE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Impact', 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: #9400d3; text-shadow: 2px 2px 0px #fff; font-size: 24px; pointer-events: none; z-index: 10; }
        #msg-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; z-index: 100;
        }
        #victory-msg { color: #FFD700; font-size: 80px; text-shadow: 0 0 30px #FFD700, 5px 5px 0 #000; display: none; }
        #level-up { color: #9400d3; font-size: 60px; text-shadow: 0 0 20px #fff; }
        #loading {
            position: fixed; width: 100%; height: 100%; background: linear-gradient(135deg, #000 0%, #4b0082 100%);
            color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .status-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; margin-top: 5px; }
        #exp-fill { width: 0%; height: 100%; background: #9400d3; transition: 0.3s; }
        button { padding: 20px 40px; font-size: 25px; cursor: pointer; background: #9400d3; color: white; border: 4px solid white; border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px #9400d3; }
    </style>
</head>
<body>

<div id="loading">
    <h1 style="font-size: 60px; margin-bottom: 10px;">RIKU 3D OMEGA</h1>
    <h2 style="color: #FFD700; margin-bottom: 30px;">~ THE COMPLETE EDITION ~</h2>
    <p style="margin-bottom: 20px;">RPG × 陸ナイトクルー × バトバトロワ</p>
    <button onclick="startGame()">完全版をプレイする (BGM ON)</button>
</div>

<div id="ui">
    <div>ALIVE: <span id="alive">20</span> / 20</div>
    <div>LEVEL: <span id="level">1</span></div>
    <div>EXP:
        <div class="status-bar"><div id="exp-fill"></div></div>
    </div>
    <div id="mode-text" style="color: #fff; margin-top: 10px;">MODE: ATTACK</div>
    <div style="font-size: 14px; color: #aaa; margin-top: 5px;">[F]建築切替 | [1-4]ブロック選択</div>
</div>

<div id="msg-box">
    <div id="level-up">LEVEL UP !!</div>
    <div id="victory-msg">🏆 VICTORY ROYALE 🏆<br><span style="font-size: 40px;">陸ナイトクルーの頂点</span></div>
</div>

<audio id="bgm" loop><source src="https://www.youtube.com/watch?v=LA50iqj0KjU" type="audio/mpeg"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, player, enemies = [], builds = [], crewMembers = [];
    let exp = 0, level = 1, buildMode = false, alive = 20, isGameOver = false;
    let buildType = 0; // 0:白 1:金 2:透明 3:ナイトクルー
    let areaSize = 100;
    const colors = [0xeeeeee, 0xffd700, 0x00ffff, 0x4b0082];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020005);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 50, 0x9400d3, 0x222222);
        scene.add(grid);

        // 安全地帯の円（バトロワエリア）
        const areaGeo = new THREE.TorusGeometry(areaSize, 0.5, 16, 100);
        areaMesh = new THREE.Mesh(areaGeo, new THREE.MeshBasicMaterial({ color: 0x9400d3 }));
        areaMesh.rotation.x = Math.PI / 2;
        scene.add(areaMesh);

        player = new THREE.Group();
        camera.position.set(0, 2, 5);
        player.add(camera);
        scene.add(player);

        for(let i=0; i<alive; i++) spawnEnemy();
        animate();
    }

    function spawnEnemy() {
        const enemy = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        enemy.position.set(Math.random()*80-40, 0.6, Math.random()*80-40);
        enemy.isFrozen = false;
        scene.add(enemy);
        enemies.push(enemy);
    }

    function animate() {
        if(isGameOver) return;
        requestAnimationFrame(animate);
        
        // エリア収縮（バトロワ）
        if(areaSize > 5) {
            areaSize -= 0.005;
            areaMesh.scale.set(areaSize/100, areaSize/100, 1);
        }

        // 敵のAI（無双・スピードアップ）
        enemies.forEach(enemy => {
            if(!enemy.isFrozen) {
                enemy.lookAt(player.position);
                enemy.translateZ(0.1 + (level * 0.02)); 
            }
        });

        // エリア外ダメージ
        if(player.position.distanceTo(new THREE.Vector3(0,0,0)) > areaSize) {
            document.body.style.boxShadow = "inset 0 0 100px red";
            exp = Math.max(0, exp - 1);
            updateUI();
        } else {
            document.body.style.boxShadow = "none";
        }

        renderer.render(scene, camera);
    }

    function startGame() {
        document.getElementById('loading').style.display = 'none';
        const audio = document.getElementById('bgm');
        audio.playbackRate = 0.85; 
        audio.play();
        init();
    }

    function updateUI() {
        document.getElementById('exp-fill').style.width = (exp / 10) + "%";
        document.getElementById('level').innerText = level;
        document.getElementById('alive').innerText = alive;
    }

    window.addEventListener('mousedown', () => {
        if(isGameOver) return;
        if(buildMode) {
            const bMat = new THREE.MeshBasicMaterial({ color: colors[buildType], transparent: buildType===2, opacity: 0.6 });
            const block = new THREE.Mesh(new THREE.BoxGeometry(1.5, buildType===3?4:1.5, 1.5), bMat);
            block.position.set(Math.round(player.position.x), 0.75, Math.round(player.position.z));
            scene.add(block);
            if(buildType === 3) { // 陸ナイトクルー像
                enemies.forEach(e => { if(e.position.distanceTo(block.position) < 12) e.isFrozen = true; });
            }
        } else {
            // 攻撃
            if(enemies.length > 0) {
                const target = enemies[0]; // 簡易的に最初の敵を倒す
                scene.remove(target);
                enemies.shift();
                alive--;
                exp += 200;
                if(exp >= 1000) levelUp();
                if(alive <= 0) victory();
                updateUI();
            }
        }
    });

    function levelUp() {
        level++; exp = 0;
        const mb = document.getElementById('msg-box');
        mb.style.display = 'block';
        document.getElementById('level-up').style.display = 'block';
        setTimeout(() => mb.style.display = 'none', 2000);
    }

    function victory() {
        isGameOver = true;
        document.getElementById('msg-box').style.display = 'block';
        document.getElementById('level-up').style.display = 'none';
        document.getElementById('victory-msg').style.display = 'block';
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === 'f') { buildMode = !buildMode; document.getElementById('mode-text').innerText = buildMode ? "MODE: BUILD" : "MODE: ATTACK"; }
        if(['1','2','3','4'].includes(e.key)) buildType = parseInt(e.key) - 1;
    });
</script>
</body>
</html>
